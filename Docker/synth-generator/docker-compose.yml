# Synthetic Data Generator (Qwen2.5-72B-Instruct-AWQ via vLLM) — GPU 0+1
# Uses both GPUs with tensor parallelism for maximum throughput.
#
# Usage:
#   cd /data/projects/lai/Docker/synth-generator && docker compose up -d
#   curl http://localhost:8005/v1/models
#   docker compose down

services:
  synth-generator:
    image: vllm-eval-local:working        # only image with sm_120 (Blackwell) kernels
    container_name: lai_synth_generator
    restart: unless-stopped
    stop_grace_period: 120s
    command: >-
      Qwen/Qwen2.5-72B-Instruct-AWQ
      --served-model-name Qwen/Qwen2.5-72B-Instruct-AWQ
      --quantization awq_marlin
      --host 0.0.0.0
      --port 8000
      --tensor-parallel-size 2
      --max-model-len 8192
      --gpu-memory-utilization 0.90
      --dtype float16
      --max-num-seqs 16
      --enable-chunked-prefill
      --enable-prefix-caching
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/vllm:/root/.cache/vllm
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - lai_network

networks:
  lai_network:
    external: true
