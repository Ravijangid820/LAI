# Redis
# Usage:
#   docker compose up -d
#   docker compose down

services:
  redis:
    image: redis:7-alpine
    container_name: lai_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lai_network

networks:
  lai_network:
    external: true
