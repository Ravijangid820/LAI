# Embedding Service (Qwen3-Embedding-8B via vLLM) — GPU 0
#
# Qwen3-Embedding-8B: #1 multilingual MTEB, 1024-dim vectors, matches DB schema.
# vLLM 0.8+ auto-detects embedding models — no --task flag needed.
#
# Usage:
#   docker compose up -d
#   docker compose down
#
# Memory notes:
#   - ~16GB weights (fp16) + KV cache; stay under GPU free memory
#   - If GPU 0 is busy (e.g. Qwen 72B running), drop gpu-memory-utilization
#     or move to GPU 1 via `device_ids: ['1']`

services:
  embedding:
    image: vllm/vllm-openai:latest
    container_name: lai_embedding
    restart: unless-stopped
    ipc: host
    # Model as positional arg (the `--model` flag is deprecated in vLLM 0.8+)
    # max-model-len 32768: matches Qwen3 training (up to 40960); embeds full
    # child chunks without truncation. Needs headroom — set EMBEDDING_GPU_MEM
    # to 0.45+ if teacher LLM is stopped, or keep 0.22 only if max-len is small.
    command: >
      ${EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-8B}
      --dtype auto
      --trust-remote-code
      --max-model-len 32768
      --gpu-memory-utilization ${EMBEDDING_GPU_MEM:-0.45}
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./model-cache:/root/.cache/huggingface
    ports:
      - "${EMBEDDING_PORT:-8003}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - lai_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${EMBEDDING_GPU:-0}']
              capabilities: [gpu]

networks:
  lai_network:
    external: true
