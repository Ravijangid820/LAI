# MLflow Tracking Server
# Backend: PostgreSQL (lai_postgres)
# Artifact Store: MinIO (lai_minio)
#
# Usage:
#   docker compose up -d
#   docker compose down
#
# UI: http://localhost:5000

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: lai_mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${PGUSER:-lai_user}:${PGPASSWORD:-lai_test_password_2024}@lai_postgres:5432/${PGDATABASE:-lai_db}
      --default-artifact-root s3://mlflow-artifacts/
      --serve-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://lai_minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-laiadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-superStrongPassword123!}
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    depends_on:
      create-bucket:
        condition: service_completed_successfully
    networks:
      - lai_network

  # One-shot init container: creates the mlflow-artifacts bucket in MinIO
  create-bucket:
    image: minio/mc:latest
    container_name: lai_mlflow_init
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://lai_minio:9000 ${MINIO_ACCESS_KEY:-laiadmin} ${MINIO_SECRET_KEY:-superStrongPassword123!} &&
      mc mb --ignore-existing minio/mlflow-artifacts &&
      echo 'Bucket mlflow-artifacts ready'
      "
    networks:
      - lai_network

networks:
  lai_network:
    external: true
