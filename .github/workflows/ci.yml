# LAI — Continuous Integration
#
# Runs every push and PR. Mirrors `make check` in LAI/Makefile, so anything
# passing locally is what the pipeline will evaluate. Fail-fast and strict:
# every job is required.
#
# Strict-mode coverage targets `lai.common` only (matches the [tool.mypy]
# and [tool.coverage] scope in LAI/pyproject.toml). As more code migrates
# into clean status, the paths expand there — this workflow does not need
# editing for that.

name: ci

on:
  push:
    branches: [master, main, v2-restructure]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: LAI

env:
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.9.29"
  # Make uv place its cache in a path that actions/cache can persist.
  UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

jobs:
  # ── Lint + format check ─────────────────────────────────────────────────
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "LAI/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - run: make lint

  # ── Static typing (strict on lai.common) ────────────────────────────────
  type:
    name: type (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "LAI/uv.lock"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - run: make type

  # ── Unit tests + coverage gate (>=85% on lai.common, branch coverage) ───
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "LAI/uv.lock"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - run: make cov

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: LAI/.coverage_html
          if-no-files-found: ignore
          retention-days: 14

  # ── Security scan (bandit) ──────────────────────────────────────────────
  security:
    name: security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "LAI/uv.lock"

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --extra dev
      - run: make security

  # ── Aggregate gate — required check for branch protection ───────────────
  ci-gate:
    name: ci gate
    needs: [lint, type, test, security]
    runs-on: ubuntu-latest
    steps:
      # This job has no checkout, so the repo's ``LAI/`` subdir — the global
      # ``defaults.run.working-directory: LAI`` — does not exist in its
      # workspace. Run this echo in the workspace root instead; otherwise bash
      # fails with "working directory .../LAI/LAI/LAI: No such file or directory".
      - run: echo "All required checks passed."
        working-directory: ${{ github.workspace }}
